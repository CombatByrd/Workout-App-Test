<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-category { background: #3b82f6; color: white; box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen pb-24">

    <nav class="p-6 flex justify-between items-center border-b border-slate-800 bg-[#0f172a]/80 sticky top-0 z-50 backdrop-blur-md">
        <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">ProFit</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Personal Best Tracker</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center">
            <span class="text-blue-400">⚡</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        
        <section id="library" class="tab-content active">
            <h2 class="text-2xl font-bold mb-4">Exercise Library</h2>
            
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterLibrary('all')" class="cat-btn active-category whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border border-slate-700">All</button>
                <button onclick="filterLibrary('legs')" class="cat-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border border-slate-700">Legs</button>
                <button onclick="filterLibrary('back')" class="cat-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border border-slate-700">Back</button>
                <button onclick="filterLibrary('arms')" class="cat-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border border-slate-700">Arms/Push</button>
                <button onclick="filterLibrary('core')" class="cat-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border border-slate-700">Core</button>
            </div>

            <div id="library-grid" class="grid grid-cols-1 gap-3">
                </div>
        </section>

        <section id="pbs" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Personal Bests</h2>
            <div class="glass p-5 rounded-2xl mb-6">
                <input type="text" id="pb-name" placeholder="Running 5k..." class="w-full bg-slate-900/50 p-3 rounded-xl mb-3 border border-slate-700 focus:border-blue-500 outline-none">
                <input type="text" id="pb-val" placeholder="24:15 or 100kg" class="w-full bg-slate-900/50 p-3 rounded-xl mb-4 border border-slate-700 focus:border-blue-500 outline-none">
                <button onclick="savePB()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all">Record Achievement</button>
            </div>
            <div id="pb-list" class="space-y-3"></div>
        </section>

    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-3xl p-2 flex justify-between items-center shadow-2xl">
        <button onclick="switchTab('library')" class="flex-1 py-3 rounded-2xl flex flex-col items-center gap-1 hover:bg-white/5">
            <span class="text-xs font-bold">LIBRARY</span>
        </button>
        <button onclick="switchTab('pbs')" class="flex-1 py-3 rounded-2xl flex flex-col items-center gap-1 hover:bg-white/5 border-l border-slate-800">
            <span class="text-xs font-bold">MY PB'S</span>
        </button>
    </div>

    <script>
        const exerciseData = [
            { name: "Bodyweight Squats", cat: "legs", desc: "Keep chest up, depth below parallel" },
            { name: "Lunges", cat: "legs", desc: "Step forward, 90 degree knee bend" },
            { name: "Pullups", cat: "back", desc: "Full extension, chin over bar" },
            { name: "Inverted Rows", cat: "back", desc: "Chest to bar, core tight" },
            { name: "Pushups", cat: "arms", desc: "Elbows tucked, flat back" },
            { name: "Dips", cat: "arms", desc: "Lean forward for chest, upright for triceps" },
            { name: "Plank", cat: "core", desc: "Squeeze glutes and abs" },
            { name: "Leg Raises", cat: "core", desc: "Lower back flat on ground" }
        ];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function filterLibrary(category) {
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(b => b.classList.remove('active-category'));
            event.target.classList.add('active-category');

            const grid = document.getElementById('library-grid');
            const filtered = category === 'all' ? exerciseData : exerciseData.filter(e => e.cat === category);
            
            grid.innerHTML = filtered.map(ex => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center group active:scale-95 transition-transform">
                    <div>
                        <span class="text-[10px] uppercase text-blue-400 font-bold tracking-widest">${ex.cat}</span>
                        <h3 class="text-lg font-semibold">${ex.name}</h3>
                        <p class="text-xs text-slate-400">${ex.desc}</p>
                    </div>
                    <div class="h-8 w-8 rounded-full border border-slate-700 flex items-center justify-center text-slate-500 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        +
                    </div>
                </div>
            `).join('');
        }

        function savePB() {
            const name = document.getElementById('pb-name').value;
            const val = document.getElementById('pb-val').value;
            if(!name || !val) return;
            const pbs = JSON.parse(localStorage.getItem('proPBs') || '[]');
            pbs.push({ name, val, date: new Date().toLocaleDateString() });
            localStorage.setItem('proPBs', JSON.stringify(pbs));
            document.getElementById('pb-name').value = '';
            document.getElementById('pb-val').value = '';
            loadPBs();
        }

        function loadPBs() {
            const list = document.getElementById('pb-list');
            const pbs = JSON.parse(localStorage.getItem('proPBs') || '[]');
            list.innerHTML = pbs.map((pb, i) => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                    <div>
                        <p class="text-sm font-bold">${pb.name}</p>
                        <p class="text-xl font-black text-white">${pb.val}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${pb.date}</p>
                    </div>
                    <button onclick="deletePB(${i})" class="text-slate-600 text-xs">Remove</button>
                </div>
            `).reverse().join('');
        }

        function deletePB(i) {
            let pbs = JSON.parse(localStorage.getItem('proPBs'));
            pbs.splice(pbs.length - 1 - i, 1);
            localStorage.setItem('proPBs', JSON.stringify(pbs));
            loadPBs();
        }

        // Initialize
        filterLibrary('all');
        loadPBs();
    </script>
</body>
</html>
                    <option value="3">Day 3: Full Body/Core</option>
                </select>
            </div>

            <div id="exercise-list" class="space-y-4">
                </div>

            <div class="mt-8 bg-gray-800 p-6 rounded-xl border border-gray-700 text-center">
                <h3 class="text-lg font-bold mb-2 text-green-400">Cooldown Timer</h3>
                <div id="timer-display" class="text-5xl font-mono mb-4">01:00</div>
                <div class="flex gap-2 justify-center">
                    <button onclick="startTimer()" class="bg-green-600 px-6 py-2 rounded-full font-bold">START</button>
                    <button onclick="resetTimer()" class="bg-red-600 px-6 py-2 rounded-full font-bold">RESET</button>
                </div>
            </div>

            <div class="bg-blue-900/30 p-4 rounded-lg border border-blue-500 mt-6">
                <h3 class="font-bold text-blue-300">🧘 Ending Stretches</h3>
                <p class="text-sm italic">Cobra Stretch, Pigeon Pose, Child's Pose</p>
            </div>
        </section>

        <section id="pbs-sec" class="hidden">
            <div class="bg-gray-800 p-4 rounded-lg mb-6">
                <h3 class="font-bold mb-4">Add New Personal Best</h3>
                <input type="text" id="pb-name" placeholder="Exercise (e.g. 5k Run)" class="w-full bg-gray-700 p-2 rounded mb-2 border-none">
                <input type="text" id="pb-val" placeholder="Result (e.g. 22:30 or 50kg)" class="w-full bg-gray-700 p-2 rounded mb-4 border-none">
                <button onclick="savePB()" class="w-full bg-blue-600 p-2 rounded font-bold uppercase tracking-wider">Save Achievement</button>
            </div>

            <div id="pb-display" class="space-y-2">
                </div>
        </section>

    </main>

    <script>
        // --- DATA ---
        const workouts = {
            1: ["Pushups: 3 sets to failure", "Dips: 3 x 12", "Inverted Rows: 3 x 10"],
            2: ["Bodyweight Squats: 4 x 20", "Lunges: 3 x 12 per leg", "Glute Bridges: 3 x 15"],
            3: ["Plank: 3 x 60s", "Burpees: 3 x 10", "Mountain Climbers: 3 x 30s"]
        };

        // --- NAVIGATION ---
        function showSection(sec) {
            document.getElementById('workout-sec').classList.toggle('hidden', sec !== 'workout');
            document.getElementById('pbs-sec').classList.toggle('hidden', sec !== 'pbs');
            document.getElementById('btn-workout').classList.toggle('active-tab', sec === 'workout');
            document.getElementById('btn-pbs').classList.toggle('active-tab', sec === 'pbs');
        }

        // --- WORKOUT LOGIC ---
        function loadWorkout() {
            const day = document.getElementById('day-select').value;
            const list = document.getElementById('exercise-list');
            list.innerHTML = workouts[day].map(ex => `
                <div class="flex items-center bg-gray-800 p-4 rounded-lg border-l-4 border-blue-500">
                    <input type="checkbox" class="w-6 h-6 mr-4">
                    <span>${ex}</span>
                </div>
            `).join('');
        }

        // --- TIMER LOGIC ---
        let timer;
        let timeLeft = 60;
        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Cooldown Finished!");
                    return;
                }
                timeLeft--;
                updateTimerDisplay();
            }, 1000);
        }
        function resetTimer() {
            clearInterval(timer);
            timeLeft = 60;
            updateTimerDisplay();
        }
        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // --- PB LOGIC ---
        function savePB() {
            const name = document.getElementById('pb-name').value;
            const val = document.getElementById('pb-val').value;
            if(!name || !val) return;
            
            const pbs = JSON.parse(localStorage.getItem('myPBs') || '[]');
            pbs.push({ name, val, date: new Date().toLocaleDateString() });
            localStorage.setItem('myPBs', JSON.stringify(pbs));
            
            document.getElementById('pb-name').value = '';
            document.getElementById('pb-val').value = '';
            displayPBs();
        }

        function displayPBs() {
            const pbs = JSON.parse(localStorage.getItem('myPBs') || '[]');
            document.getElementById('pb-display').innerHTML = pbs.map((pb, index) => `
                <div class="bg-gray-800 p-3 rounded flex justify-between items-center border border-gray-700">
                    <div>
                        <div class="font-bold text-blue-400">${pb.name}</div>
                        <div class="text-xl">${pb.val}</div>
                        <div class="text-xs text-gray-500">${pb.date}</div>
                    </div>
                    <button onclick="deletePB(${index})" class="text-gray-600 hover:text-red-500 text-sm">Delete</button>
                </div>
            `).reverse().join('');
        }

        function deletePB(index) {
            let pbs = JSON.parse(localStorage.getItem('myPBs'));
            pbs.splice(pbs.length - 1 - index, 1);
            localStorage.setItem('myPBs', JSON.stringify(pbs));
            displayPBs();
        }

        // Init
        loadWorkout();
        displayPBs();
    </script>
</body>
</html>
