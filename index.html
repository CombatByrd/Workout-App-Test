<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra - Visionary</title>
    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff;
            --primary: #00ff88; --accent: #333; --rest: #3498db; --fuel: #f1c40f; --danger: #ff4444; --weight: #a29bfe;
        }
        [data-theme="light"] {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a;
            --primary: #00b361; --accent: #e4e6eb; --rest: #2980b9; --fuel: #d4ac0d; --danger: #d32f2f; --weight: #6c5ce7;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: #666; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .page { display: none; animation: slide 0.3s ease; }
        .page.active { display: block; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* CARDS */
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--accent); }
        h2 { font-size: 1.8rem; font-weight: 800; margin: 10px 0; }
        h3 { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }

        /* INPUTS */
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--accent); border: none; border-radius: 12px; color: var(--text); font-size: 1rem; box-sizing: border-box;}
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-outline { background: none; border: 1px solid var(--accent); color: var(--text); padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 0.75rem; }
        .btn-outline.active { border-color: var(--primary); color: var(--primary); background: rgba(0,255,136,0.05); }

        /* CALENDAR */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 12px 0; text-align: center; background: var(--accent); border-radius: 8px; font-size: 0.8rem; position: relative; cursor: pointer; }
        .day.selected { background: var(--primary); color: #000; font-weight: bold; }
        .fuel-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--fuel); border-radius: 0 0 8px 8px; transition: 0.3s; }
        
        .stat-badge { background: var(--accent); padding: 10px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #888; }

        /* GRAPH */
        #weightGraph { width: 100%; height: 150px; margin-top: 10px; }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    
    <section id="page-today" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Today</h2>
            <span id="header-date" style="font-size: 0.8rem; color: #888;"></span>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="stat-badge">
                <span class="stat-label">Goal</span>
                <span class="stat-val" id="goal-stat">0</span>
            </div>
            <div class="stat-badge">
                <span class="stat-label">Weight</span>
                <span class="stat-val" id="weight-stat">0</span>
            </div>
            <div class="stat-badge">
                <span class="stat-label">Cooldown</span>
                <span class="stat-val" style="color:var(--rest)" id="timer-val">01:30</span>
            </div>
        </div>

        <div class="card">
            <h3>Routine Architect</h3>
            <div style="display:flex; gap:5px; margin-bottom:12px;">
                <button class="btn-outline" onclick="buildRoutine('Arms', this)">Arms</button>
                <button class="btn-outline" onclick="buildRoutine('Legs', this)">Legs</button>
                <button class="btn-outline" onclick="buildRoutine('Back', this)">Back</button>
                <button class="btn-outline" onclick="buildRoutine('Core', this)">Core</button>
            </div>
            <p id="routine-desc" style="font-size:0.75rem; color:#888; margin:0;">Tap a focus to generate a dumbbell + bodyweight mix.</p>
        </div>

        <div class="card" style="border-color: var(--rest); padding: 12px;">
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-outline" style="flex:0.5" onclick="adjustTimer(-30)">-30s</button>
                <button class="btn-main" id="timer-toggle" onclick="toggleTimer()" style="background:var(--rest); color:#fff;">START COOLDOWN</button>
                <button class="btn-outline" style="flex:0.5" onclick="adjustTimer(30)">+30s</button>
            </div>
        </div>

        <div class="card">
            <h3>Tracker</h3>
            <input list="ex-lib" id="ex-name" placeholder="Exercise Name">
            <datalist id="ex-lib"></datalist>
            <div style="display:flex; gap:10px;">
                <input type="number" id="ex-sets" placeholder="Sets" oninput="updateDots()">
                <input type="number" id="ex-reps" placeholder="Reps">
            </div>
            <div id="dot-container" style="display:flex; justify-content:center; gap:6px; margin-bottom:15px;"></div>
            <button id="set-btn" class="btn-main" onclick="logSet()">Log Set 1</button>
        </div>

        <div id="today-logs"></div>
    </section>

    <section id="page-history" class="page">
        <h2>History</h2>
        
        <div class="card">
            <h3>Weight Trend (Month)</h3>
            <canvas id="weightGraph"></canvas>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button onclick="changeMonth(-1)" style="color:var(--text); background:none; border:none; font-size:1.5rem;">◀</button>
                <h4 id="month-name" style="margin:0;"></h4>
                <button onclick="changeMonth(1)" style="color:var(--text); background:none; border:none; font-size:1.5rem;">▶</button>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <div class="card">
            <h3>Vitals for <span id="vit-date"></span></h3>
            <div style="display:flex; gap:10px;">
                <input type="number" id="cal-input" placeholder="Calories">
                <input type="number" id="weight-input" placeholder="Weight (lbs)">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="goal-input" placeholder="Daily Calorie Goal">
                <button onclick="saveVitals()" class="btn-main" style="width:80px; padding:0;">Save</button>
            </div>
        </div>
        <div id="history-details"></div>
    </section>

    <section id="page-lib" class="page">
        <h2>Encyclopedia</h2>
        <input type="text" id="lib-search" placeholder="Search (e.g. Dumbbell, Chest, Core...)" oninput="renderLibrary()">
        <div id="lib-list"></div>
    </section>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('today', this)"><span style="font-size:1.5rem">⚡</span>Today</button>
    <button class="nav-item" onclick="showPage('history', this)"><span style="font-size:1.5rem">📅</span>History</button>
    <button class="nav-item" onclick="showPage('lib', this)"><span style="font-size:1.5rem">📚</span>Library</button>
</nav>

<script>
    let currentSet = 1, timerSec = 90, timerRunning = false, timerInt;
    let selectedDate = new Date().toLocaleDateString();
    let viewDate = new Date();

    const db = [
        { name: "DB Bicep Curls", muscle: "Arms", info: "Keep elbows glued to ribs." },
        { name: "DB Overhead Extension", muscle: "Arms", info: "Hold one DB with both hands." },
        { name: "DB Hammer Curls", muscle: "Arms", info: "Neutral grip, targets forearms/biceps." },
        { name: "DB Kickbacks", muscle: "Arms", info: "Lean forward, extend arm fully back." },
        { name: "DB Concentration Curls", muscle: "Arms", info: "Sit and use inner thigh as brace." },
        { name: "Diamond Pushups", muscle: "Arms", info: "Bodyweight tricep focus." },
        { name: "DB Goblet Squats", muscle: "Legs", info: "Hold DB at chest height." },
        { name: "DB Lunges", muscle: "Legs", info: "Hold DBs at your sides." },
        { name: "DB Romanian Deadlift", muscle: "Legs", info: "Hinge at hips, feel hamstrings." },
        { name: "DB Bulgarian Split Squat", muscle: "Legs", info: "Elevate rear foot on bench." },
        { name: "DB Calf Raises", muscle: "Legs", info: "Slow and controlled." },
        { name: "Bodyweight Squats", muscle: "Legs", info: "Air squats for volume." },
        { name: "DB Single Arm Row", muscle: "Back", info: "One hand on bench for support." },
        { name: "DB Renegade Row", muscle: "Back", info: "Pushup position, row DB to hip." },
        { name: "DB Pullovers", muscle: "Back", info: "Lying on bench, reach DB back overhead." },
        { name: "DB Shrugs", muscle: "Back", info: "Focus on upper traps." },
        { name: "DB Reverse Flys", muscle: "Back", info: "Lean forward, fly DBs out wide." },
        { name: "Pullups", muscle: "Back", info: "Bodyweight back staple." },
        { name: "DB Russian Twists", muscle: "Core", info: "Feet elevated, rotate DB side to side." },
        { name: "DB Weighted Crunch", muscle: "Core", info: "Hold DB at chest." },
        { name: "DB Side Bends", muscle: "Core", info: "Hold DB in one hand, dip to side." },
        { name: "DB Woodchoppers", muscle: "Core", info: "Diagonal rotational movement." },
        { name: "DB Leg Raises", muscle: "Core", info: "Hold DB between feet (advanced)." },
        { name: "Plank", muscle: "Core", info: "Traditional isometric hold." }
    ];

    function showPage(p, btn) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        btn.classList.add('active');
        renderAll();
    }

    // --- VITALS & WEIGHT GRAPH ---
    function saveVitals() {
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const d = selectedDate;
        if(!v[d]) v[d] = {};
        v[d].cal = document.getElementById('cal-input').value;
        v[d].weight = document.getElementById('weight-input').value;
        if(document.getElementById('goal-input').value) localStorage.setItem('calGoal', document.getElementById('goal-input').value);
        localStorage.setItem('ultraVitals', JSON.stringify(v));
        renderAll();
    }

    function renderWeightGraph() {
        const canvas = document.getElementById('weightGraph');
        const ctx = canvas.getContext('2d');
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        
        // Prepare data for current month
        const dataPoints = [];
        const lastDay = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        for(let i=1; i<=lastDay; i++) {
            const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), i).toLocaleDateString();
            if(v[d] && v[d].weight) dataPoints.push({x: i, y: parseFloat(v[d].weight)});
        }

        ctx.clearRect(0,0, canvas.width, canvas.height);
        if(dataPoints.length < 2) {
            ctx.fillStyle = "#888"; ctx.font = "12px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Log at least 2 days of weight to see trend", canvas.width/2, canvas.height/2);
            return;
        }

        const minW = Math.min(...dataPoints.map(p => p.y)) - 2;
        const maxW = Math.max(...dataPoints.map(p => p.y)) + 2;
        const range = maxW - minW;

        ctx.beginPath();
        ctx.strokeStyle = "var(--primary)"; ctx.lineWidth = 3; ctx.lineJoin = "round";
        dataPoints.forEach((p, i) => {
            const x = (p.x / lastDay) * canvas.width;
            const y = canvas.height - ((p.y - minW) / range) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Dots
        dataPoints.forEach(p => {
            const x = (p.x / lastDay) * canvas.width;
            const y = canvas.height - ((p.y - minW) / range) * canvas.height;
            ctx.fillStyle = "var(--primary)"; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
        });
    }

    // --- COOLDOWN TIMER ---
    function toggleTimer() {
        if(timerRunning) { clearInterval(timerInt); document.getElementById('timer-toggle').innerText = "START COOLDOWN"; }
        else {
            timerInt = setInterval(() => {
                timerSec--; updateTimerDisplay();
                if(timerSec <= 0) { clearInterval(timerInt); playDing(); timerRunning = false; document.getElementById('timer-toggle').innerText = "START COOLDOWN"; }
            }, 1000);
            document.getElementById('timer-toggle').innerText = "STOP";
        }
        timerRunning = !timerRunning;
    }
    function adjustTimer(amt) { timerSec = Math.max(0, timerSec + amt); updateTimerDisplay(); }
    function updateTimerDisplay() {
        let m = Math.floor(timerSec/60), s = timerSec%60;
        document.getElementById('timer-val').innerText = `${m}:${s<10?'0'+s:s}`;
    }
    function playDing() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 1);
        } catch(e) {}
    }

    // --- LOGIC HELPERS ---
    function updateStats() {
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const goal = localStorage.getItem('calGoal') || 2500;
        document.getElementById('header-date').innerText = new Date().toLocaleDateString();
        document.getElementById('goal-stat').innerText = goal;
        document.getElementById('weight-stat').innerText = (v[selectedDate]?.weight || "--") + " lbs";
        document.getElementById('vit-date').innerText = selectedDate;
    }

    function buildRoutine(focus, btn) {
        document.querySelectorAll('.btn-outline').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const selected = db.filter(ex => ex.muscle === focus).sort(() => 0.5 - Math.random()).slice(0, 4);
        document.getElementById('routine-desc').innerHTML = `<strong>Suggested:</strong> ` + selected.map(s => s.name).join(', ');
        document.getElementById('ex-name').value = selected[0].name;
        document.getElementById('ex-sets').value = 3; document.getElementById('ex-reps').value = 10;
        updateDots();
    }

    function updateDots() {
        const s = parseInt(document.getElementById('ex-sets').value) || 0;
        const container = document.getElementById('dot-container');
        container.innerHTML = Array.from({length:s}, (_,i) => `<div style="width:10px; height:10px; border-radius:50%; background:${i < currentSet-1 ? 'var(--primary)' : '#333'}"></div>`).join('');
        document.getElementById('set-btn').innerText = (currentSet > s && s > 0) ? "Finish Exercise" : `Log Set ${currentSet}`;
    }

    function logSet() {
        const s = parseInt(document.getElementById('ex-sets').value);
        if(currentSet < s) { currentSet++; updateDots(); } 
        else { saveWorkout(); resetTracker(); }
    }

    function saveWorkout() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        logs.push({ id: Date.now(), date: new Date().toLocaleDateString(), name: document.getElementById('ex-name').value, sets: document.getElementById('ex-sets').value, reps: document.getElementById('ex-reps').value });
        localStorage.setItem('ultraLogs', JSON.stringify(logs)); renderAll();
    }

    function resetTracker() { currentSet = 1; document.getElementById('ex-name').value = ''; document.getElementById('ex-sets').value = ''; document.getElementById('ex-reps').value = ''; updateDots(); }

    function renderCalendar() {
        const grid = document.getElementById('calendar');
        document.getElementById('month-name').innerText = viewDate.toLocaleString('default', {month:'long', year:'numeric'});
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const goal = localStorage.getItem('calGoal') || 2500;
        grid.innerHTML = '';
        for(let i=1; i<=last; i++) {
            const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), i).toLocaleDateString();
            const dayEl = document.createElement('div');
            dayEl.className = `day ${d === selectedDate ? 'selected' : ''}`;
            const fuel = Math.min((parseInt(v[d]?.cal||0)/goal)*100, 100);
            dayEl.innerHTML = `${i} <div class="fuel-bar" style="width:${fuel}%"></div>`;
            dayEl.onclick = () => { selectedDate = d; renderAll(); };
            grid.appendChild(dayEl);
        }
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const filtered = logs.filter(l => l.date === selectedDate);
        const html = filtered.map(l => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><strong>${l.name}</strong><br><small>${l.sets}x${l.reps}</small></div>
                <button onclick="deleteLog(${l.id})" style="color:var(--danger); background:none; border:none; font-size:1.2rem;">✕</button>
            </div>
        `).join('');
        document.getElementById('history-details').innerHTML = html || '<p style="text-align:center; color:#666; font-size:0.8rem;">No activity.</p>';
        if(selectedDate === new Date().toLocaleDateString()) document.getElementById('today-logs').innerHTML = `<h3>Logged Today</h3>` + html;
    }

    function renderLibrary() {
        const q = document.getElementById('lib-search').value.toLowerCase();
        document.getElementById('lib-list').innerHTML = db.filter(ex => ex.name.toLowerCase().includes(q) || ex.muscle.toLowerCase().includes(q)).map(ex => `
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${ex.name}</strong>
                    <span style="color:var(--primary); font-size:0.7rem;">${ex.muscle}</span>
                </div>
                <p style="font-size:0.8rem; color:#888; margin-top:5px;">${ex.info}</p>
            </div>
        `).join('');
    }

    function deleteLog(id) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs')).filter(l => l.id !== id);
        localStorage.setItem('ultraLogs', JSON.stringify(logs)); renderAll();
    }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth()+dir); renderAll(); }
    function renderAll() { updateStats(); renderCalendar(); renderHistory(); renderLibrary(); renderWeightGraph(); }
    
    document.getElementById('ex-lib').innerHTML = db.map(ex => `<option value="${ex.name}">`).join('');
    renderAll();
</script>
</body>
</html>
