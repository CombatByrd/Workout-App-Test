<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronBot: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14; --card: #161b22; --text: #e6edf3;
            --primary: #58a6ff; --bot-glow: #00ffcc; --rest: #79c0ff;
            --danger: #ff7b72; --bright-green: #39d353; --fuel: #f1c40f;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 20px; box-sizing: border-box; }

        /* --- THE NEW IRONBOT --- */
        .bot-scene { height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .bot-body { width: 80px; height: 80px; background: #30363d; border: 4px solid var(--bot-glow); border-radius: 25px; position: relative; animation: float 3s infinite ease-in-out; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        
        /* Arms */
        .arm { width: 15px; height: 40px; background: #30363d; border: 3px solid var(--bot-glow); position: absolute; border-radius: 10px; top: 20px; transition: 0.3s; }
        .arm-l { left: -25px; transform-origin: top right; transform: rotate(10deg); }
        .arm-r { right: -25px; transform-origin: top left; transform: rotate(-10deg); }
        
        /* Face */
        .eyes { display: flex; justify-content: space-around; width: 40px; margin: 20px auto 5px; }
        .eye { width: 10px; height: 10px; background: var(--bot-glow); border-radius: 50%; box-shadow: 0 0 10px var(--bot-glow); }
        .mouth { width: 20px; height: 4px; background: var(--bot-glow); margin: 5px auto; border-radius: 10px; box-shadow: 0 0 5px var(--bot-glow); transition: 0.3s; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .working .arm-l { transform: rotate(140deg); }
        .working .arm-r { transform: rotate(-140deg); }
        .working .mouth { height: 10px; width: 10px; border-radius: 50%; }
        .resting .eye { height: 2px; }
        .resting .mouth { width: 10px; opacity: 0.5; }

        /* XP BAR */
        .xp-container { width: 150px; height: 8px; background: #111; border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        #xp-bar { width: 30%; height: 100%; background: linear-gradient(90deg, var(--bot-glow), var(--primary)); transition: 1s; }

        /* --- UI COMPONENTS --- */
        .glass-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.08); }
        .debrief-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .debrief-card { background: rgba(88,166,255,0.05); border: 1px solid rgba(88,166,255,0.1); border-radius: 18px; padding: 12px; text-align: center; }
        .debrief-card label { font-size: 0.55rem; color: var(--primary); display: block; font-weight: 800; }
        .debrief-card span { font-size: 1rem; font-weight: 900; }

        input, select { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: 'Outfit'; }
        .btn-cyber { padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Outfit'; width: 100%; }
        .nav-bar { position: fixed; bottom: 20px; left: 10px; right: 10px; background: #161b22; border-radius: 30px; height: 70px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #333; }
        .nav-item { color: #8b949e; background: none; border: none; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--bot-glow); }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <section id="page-today" class="page active">
        <div class="bot-scene" id="bot-scene">
            <div class="bot-body" id="iron-bot">
                <div class="arm arm-l"></div>
                <div class="arm arm-r"></div>
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="mouth"></div>
            </div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div style="font-size: 0.6rem; margin-top: 5px; font-weight: 800; color: var(--bot-glow);">LVL <span id="bot-lvl">1</span> BOT COMPANION</div>
        </div>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="timer-display" style="font-size: 2rem; color: var(--rest); margin:0;">01:30</h3>
                <div style="display:flex; gap:5px;">
                    <button class="btn-cyber" style="width:40px; padding:5px; background:#333; color:white;" onclick="adjTimer(-30)">-</button>
                    <button id="t-btn" class="btn-cyber" style="width:100px; padding:5px; background:var(--rest); color:white;" onclick="toggleTimer()">Rest</button>
                    <button class="btn-cyber" style="width:40px; padding:5px; background:#333; color:white;" onclick="adjTimer(30)">+</button>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button id="m-w" class="btn-cyber" style="font-size:0.6rem; background:var(--card); color:var(--bot-glow)" onclick="setMode('w')">Lifting</button>
                <button id="m-c" class="btn-cyber" style="font-size:0.6rem; background:none; color:#666" onclick="setMode('c')">Cardio</button>
            </div>
            <input id="ex-name" placeholder="Exercise Name">
            <div id="w-inputs" style="display:flex; gap:10px;"><input type="number" id="ex-s" placeholder="Sets"><input type="number" id="ex-r" placeholder="Reps"></div>
            <div id="c-inputs" style="display:none; gap:10px;"><input type="number" id="ex-t" placeholder="Min"><input type="number" id="ex-d" placeholder="Miles"></div>
            <button class="btn-cyber" style="background:var(--primary); color:white;" onclick="logData()">Sync Session</button>
        </div>
    </section>

    <section id="page-stats" class="page">
        <h2>Intelligence Debrief</h2>
        <div class="debrief-grid">
            <div class="debrief-card"><label>Monthly Miles</label><span id="st-m">0.0</span></div>
            <div class="debrief-card"><label>Total Reps</label><span id="st-v">0</span></div>
            <div class="debrief-card"><label>Weight Delta</label><span id="st-d">--</span></div>
            <div class="debrief-card"><label>Signature</label><span id="st-f" style="font-size:0.7rem;">--</span></div>
        </div>
        <div class="glass-card"><canvas id="wGraph" style="width:100%; height:120px;"></canvas></div>
        <div id="hist-list"></div>
    </section>

    <section id="page-lib" class="page">
        <h2>Encyclopedia</h2>
        <input type="text" placeholder="Search..." oninput="renderLib(this.value)">
        <div id="lib-list"></div>
    </section>

    <section id="page-set" class="page">
        <h2>Calibration</h2>
        <div class="glass-card">
            <label>Weight (lbs)</label><input type="number" id="set-w">
            <label>Calorie Goal</label><input type="number" id="set-c">
            <button class="btn-cyber" style="background:var(--primary); color:white;" onclick="saveSet()">Save</button>
        </div>
    </section>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="show('today', this)"><span>🤖</span>Today</button>
    <button class="nav-item" onclick="show('stats', this)"><span>📊</span>Stats</button>
    <button class="nav-item" onclick="show('lib', this)"><span>📚</span>Lib</button>
    <button class="nav-item" onclick="show('set', this)"><span>⚙️</span>Set</button>
</nav>

<script>
    const libDB = [
        {n:"Bench Press", m:"Chest"}, {n:"Squats", m:"Legs"}, {n:"Deadlift", m:"Back"},
        {n:"Bicep Curls", m:"Arms"}, {n:"Running", m:"Cardio"}, {n:"Cycling", m:"Cardio"}
    ];
    let mode = 'w', tSec = 90, tRun = false, tInt;

    function show(p, b) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        b.classList.add('active');
        if(p==='stats') renderStats();
        if(p==='lib') renderLib();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('w-inputs').style.display = m==='w'?'flex':'none';
        document.getElementById('c-inputs').style.display = m==='c'?'flex':'none';
        document.getElementById('m-w').style.color = m==='w'?'var(--bot-glow)':'#666';
        document.getElementById('m-c').style.color = m==='c'?'var(--bot-glow)':'#666';
    }

    function adjTimer(v) { tSec = Math.max(0, tSec+v); updateT(); }
    function toggleTimer() {
        const b = document.getElementById('bot-scene');
        if(tRun) { clearInterval(tInt); tRun=false; b.classList.remove('resting'); }
        else { 
            tRun=true; b.classList.add('resting');
            tInt = setInterval(() => { tSec--; updateT(); if(tSec<=0) toggleTimer(); }, 1000);
        }
    }
    function updateT() {
        let m=Math.floor(tSec/60), s=tSec%60;
        document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
    }

    function logData() {
        const n = document.getElementById('ex-name').value; if(!n) return;
        const logs = JSON.parse(localStorage.getItem('uLogs')||'[]');
        const entry = {id:Date.now(), d:new Date().toLocaleDateString(), n, c:mode==='c'};
        if(mode==='w') { entry.s=document.getElementById('ex-s').value; entry.r=document.getElementById('ex-r').value; }
        else { entry.t=document.getElementById('ex-t').value; entry.m=document.getElementById('ex-d').value; }
        logs.push(entry); localStorage.setItem('uLogs', JSON.stringify(logs));
        
        document.getElementById('bot-scene').classList.add('working');
        setTimeout(()=> document.getElementById('bot-scene').classList.remove('working'), 1000);
        updateXP();
    }

    function updateXP() {
        const logs = JSON.parse(localStorage.getItem('uLogs')||'[]');
        let total = logs.length * 20; // 20 XP per entry
        let lvl = Math.floor(total / 100) + 1;
        let prog = total % 100;
        document.getElementById('xp-bar').style.width = prog + "%";
        document.getElementById('bot-lvl').innerText = lvl;
    }

    function renderStats() {
        const logs = JSON.parse(localStorage.getItem('uLogs')||'[]');
        const vit = JSON.parse(localStorage.getItem('uVit')||'{}');
        let miles = 0, reps = 0, counts = {};
        
        logs.forEach(l => {
            if(l.c) miles += parseFloat(l.m||0);
            else reps += (parseInt(l.s||0) * parseInt(l.r||0));
            counts[l.n] = (counts[l.n]||0) + 1;
        });

        document.getElementById('st-m').innerText = miles.toFixed(1);
        document.getElementById('st-v').innerText = reps.toLocaleString();
        const top = Object.keys(counts).reduce((a,b)=> counts[a]>counts[b]?a:b, "--");
        document.getElementById('st-f').innerText = top.toUpperCase();

        const wts = Object.keys(vit).sort((a,b)=>new Date(a)-new Date(b));
        if(wts.length > 1) {
            let delta = vit[wts[wts.length-1]].w - vit[wts[0]].w;
            document.getElementById('st-d').innerText = (delta>0?"+":"")+delta.toFixed(1);
        }

        document.getElementById('hist-list').innerHTML = logs.reverse().map(l => `
            <div class="glass-card" style="padding:10px; font-size:0.8rem;">
                <strong>${l.n}</strong> - ${l.c ? l.m+'mi' : l.s+'x'+l.r} <small>(${l.d})</small>
            </div>
        `).join('');
    }

    function renderLib(q="") {
        document.getElementById('lib-list').innerHTML = libDB.filter(x => x.n.toLowerCase().includes(q.toLowerCase())).map(x => `
            <div class="glass-card" style="display:flex; justify-content:space-between;">
                <div><strong>${x.n}</strong><br><small>${x.m}</small></div>
                <button onclick="sync('${x.n}')" style="background:var(--bot-glow); border:none; border-radius:5px; font-weight:800; padding:5px 10px;">SYNC</button>
            </div>
        `).join('');
    }

    function sync(n) { show('today', document.querySelector('.nav-item')); document.getElementById('ex-name').value = n; }
    function saveSet() {
        const w = document.getElementById('set-w').value;
        const c = document.getElementById('set-c').value;
        if(w) { const v=JSON.parse(localStorage.getItem('uVit')||'{}'); v[new Date().toLocaleDateString()]={w}; localStorage.setItem('uVit', JSON.stringify(v)); }
        if(c) localStorage.setItem('uGoal', c);
    }

    updateXP();
</script>
</body>
</html>
