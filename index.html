<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra - Final Polish</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #00ff88; --accent: #333; --danger: #ff4444; --rest: #3498db;
        }
        [data-theme="light"] {
            --bg: #f4f7f6; --card: #ffffff; --text: #1a1a1a;
            --primary: #00b361; --accent: #e0e0e0; --rest: #2980b9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--accent); position: relative; }
        h3 { margin-top: 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Calendar Styling */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { padding: 8px 0; font-size: 0.7rem; border-radius: 5px; background: var(--accent); cursor: pointer; text-align: center; border: 1px solid transparent; }
        .day.has-data { border-color: var(--primary); }
        .day.is-rest { border-color: var(--rest); color: var(--rest); font-weight: bold; }
        .day.selected { background: var(--primary); color: #000; font-weight: bold; }

        /* Momentum Chart */
        .summary-bar-container { display: flex; align-items: flex-end; justify-content: space-between; height: 60px; gap: 5px; margin-top: 10px; }
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar { width: 100%; background: var(--primary); border-radius: 2px 2px 0 0; min-height: 2px; }

        /* Workout Item & Edit UI */
        .workout-item { background: var(--accent); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .edit-input { background: #000; color: var(--primary); border: 1px solid var(--primary); width: 40px; text-align: center; border-radius: 4px; }

        /* Inputs & Buttons */
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; background: var(--accent); border: none; border-radius: 8px; color: var(--text); box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-rest { background: var(--rest); color: white; margin-top: 5px; }
        
        .live-tracker { background: var(--accent); padding: 15px; border-radius: 10px; text-align: center; }
        .set-dots { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .dot.done { background: var(--primary); }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:1.4rem;">IronTrack <span style="color:var(--primary)">ULTRA</span></h2>
        <button onclick="toggleTheme()" style="background:var(--accent); border:none; color:var(--text); padding:5px 12px; border-radius:20px; cursor:pointer;">🌓</button>
    </div>

    <div class="card">
        <h3>Weekly Momentum</h3>
        <div class="summary-bar-container" id="weekly-chart"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <button onclick="changeMonth(-1)" style="color:var(--text); background:none; border:none; cursor:pointer;">◀</button>
            <h4 id="month-display" style="margin:0; font-size:0.9rem;"></h4>
            <button onclick="changeMonth(1)" style="color:var(--text); background:none; border:none; cursor:pointer;">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
        <button class="btn-main btn-rest" onclick="toggleRestDay()">Toggle Rest Day</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3>💪 Training</h3>
            <button onclick="generateRoutine()" style="font-size:0.6rem; border:1px solid var(--primary); background:none; color:var(--primary); padding:2px 5px; border-radius:4px; cursor:pointer;">Suggest</button>
        </div>
        <div id="timer-display" style="text-align:center; font-size:1.8rem; font-weight:bold; color:var(--primary); margin-bottom:10px;">00:00</div>
        
        <input list="ex-lib" id="ex-name" placeholder="Exercise Name">
        <datalist id="ex-lib"></datalist>
        
        <div style="display:flex; gap:10px;">
            <input type="number" id="ex-target-sets" placeholder="Sets" oninput="updateDots()">
            <input type="number" id="ex-reps" placeholder="Reps">
        </div>

        <div class="live-tracker">
            <div id="set-info" style="font-size:0.8rem; margin-bottom:5px;">Set 1</div>
            <div class="set-dots" id="set-dots"></div>
            <button id="set-btn" class="btn-main" onclick="completeSet()">START SET</button>
        </div>
    </div>

    <ul id="workout-list" style="padding:0; list-style:none;"></ul>
</div>

<script>
    let currentViewDate = new Date();
    let selectedDate = new Date().toLocaleDateString();
    let currentSet = 1;
    let timerInt;

    // --- AUDIO SYNTHESIS (The Polish) ---
    function playDing() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, context.currentTime); // High A note
        gain.gain.setValueAtTime(0, context.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, context.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 1);
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 1);
    }

    document.addEventListener('DOMContentLoaded', init);

    function init() {
        renderAll();
        // Load custom lib and merge with defaults
        const lib = [...[{name:"Pushups"},{name:"Squats"},{name:"Pullups"}], ...JSON.parse(localStorage.getItem('customLib') || '[]')];
        document.getElementById('ex-lib').innerHTML = lib.map(e => `<option value="${e.name}">`).join('');
    }

    function renderAll() {
        renderCalendar();
        renderWorkouts();
        renderWeeklySummary();
        if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));
    }

    // --- CALENDAR & REST DAY ---
    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById('month-display').innerText = `${months[currentViewDate.getMonth()]} ${currentViewDate.getFullYear()}`;
        
        const lastDay = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0).getDate();
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const rests = JSON.parse(localStorage.getItem('restDays') || '[]');

        let html = "";
        for (let i = 1; i <= lastDay; i++) {
            const dateStr = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), i).toLocaleDateString();
            const hasData = logs.some(l => l.date === dateStr) ? "has-data" : "";
            const isRest = rests.includes(dateStr) ? "is-rest" : "";
            const isSelected = dateStr === selectedDate ? "selected" : "";
            html += `<div class="day ${hasData} ${isRest} ${isSelected}" onclick="selectDate('${dateStr}')">${i}</div>`;
        }
        grid.innerHTML = html;
    }

    function toggleRestDay() {
        let rests = JSON.parse(localStorage.getItem('restDays') || '[]');
        if (rests.includes(selectedDate)) {
            rests = rests.filter(d => d !== selectedDate);
        } else {
            rests.push(selectedDate);
        }
        localStorage.setItem('restDays', JSON.stringify(rests));
        renderCalendar();
    }

    function selectDate(d) { selectedDate = d; renderAll(); }
    function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }

    // --- WORKOUT LOGIC & EDITING ---
    function completeSet() {
        const name = document.getElementById('ex-name').value;
        const target = parseInt(document.getElementById('ex-target-sets').value);
        const reps = document.getElementById('ex-reps').value;
        if(!name || !target || !reps) return;

        if(currentSet >= target) {
            saveWorkout(name, target, reps);
            resetTracker();
        } else {
            currentSet++;
            startTimer(60);
            updateDots();
        }
    }

    function saveWorkout(name, sets, reps) {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        logs.push({ id: Date.now(), date: selectedDate, name, sets, reps, vol: sets * reps });
        localStorage.setItem('ultraLogs', JSON.stringify(logs));
        renderAll();
    }

    function renderWorkouts() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const filtered = logs.filter(l => l.date === selectedDate);
        const list = document.getElementById('workout-list');
        list.innerHTML = filtered.map(w => `
            <li class="workout-item">
                <div>
                    <input class="edit-input" type="number" value="${w.sets}" onchange="editLog(${w.id}, 'sets', this.value)"> x 
                    <input class="edit-input" type="number" value="${w.reps}" onchange="editLog(${w.id}, 'reps', this.value)">
                    <strong style="margin-left:10px">${w.name}</strong>
                </div>
                <button onclick="deleteLog(${w.id})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </li>
        `).join('');
    }

    function editLog(id, field, val) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs'));
        const idx = logs.findIndex(l => l.id === id);
        logs[idx][field] = parseInt(val);
        logs[idx].vol = logs[idx].sets * logs[idx].reps;
        localStorage.setItem('ultraLogs', JSON.stringify(logs));
        renderWeeklySummary();
    }

    function deleteLog(id) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs'));
        localStorage.setItem('ultraLogs', JSON.stringify(logs.filter(l => l.id !== id)));
        renderAll();
    }

    // --- TOOLS ---
    function startTimer(sec) {
        clearInterval(timerInt);
        let t = sec;
        timerInt = setInterval(() => {
            let m = Math.floor(t/60); let s = t%60;
            document.getElementById('timer-clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(t-- <= 0) { clearInterval(timerInt); playDing(); alert("Rest Finished!"); }
        }, 1000);
    }

    function renderWeeklySummary() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const chart = document.getElementById('weekly-chart');
        let days = [];
        for(let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            const vol = logs.filter(l => l.date === d.toLocaleDateString()).reduce((a,b)=>a+b.vol, 0);
            days.push(vol);
        }
        const max = Math.max(...days, 1);
        chart.innerHTML = days.map(v => `<div class="bar-wrapper"><div class="bar" style="height:${(v/max)*100}%"></div></div>`).join('');
    }

    function updateDots() {
        const target = document.getElementById('ex-target-sets').value || 0;
        document.getElementById('set-dots').innerHTML = Array.from({length:target}, (_,i) => `<div class="dot ${i < currentSet-1 ? 'done' : ''}"></div>`).join('');
        document.getElementById('set-info').innerText = `Set ${currentSet} of ${target}`;
        document.getElementById('set-btn').innerText = currentSet >= target ? "LOG FINAL SET" : "FINISH SET";
    }

    function resetTracker() {
        currentSet = 1; document.getElementById('ex-name').value = ''; document.getElementById('ex-target-sets').value = ''; document.getElementById('ex-reps').value = '';
        updateDots(); clearInterval(timerInt); document.getElementById('timer-display').innerText = "00:00";
    }

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t);
    }
</script>
</body>
</html>
