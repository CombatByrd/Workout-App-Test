<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra - Final Edition</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #00ff88; --accent: #333; --danger: #ff4444; --rest: #3498db;
        }
        [data-theme="light"] {
            --bg: #f4f7f6; --card: #ffffff; --text: #1a1a1a;
            --primary: #00b361; --accent: #e0e0e0; --rest: #2980b9;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--accent); position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h3 { margin-top: 0; color: var(--primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .day { padding: 10px 0; font-size: 0.75rem; border-radius: 6px; background: var(--accent); cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.2s; }
        .day.has-data { border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .day.is-rest { border-color: var(--rest); color: var(--rest); }
        .day.selected { background: var(--primary); color: #000; font-weight: bold; }

        /* Momentum Chart */
        .summary-bar-container { display: flex; align-items: flex-end; justify-content: space-between; height: 60px; gap: 8px; margin-top: 10px; }
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar { width: 100%; background: var(--primary); border-radius: 3px 3px 0 0; min-height: 3px; transition: height 0.4s ease; opacity: 0.8; }
        .bar-label { font-size: 0.6rem; color: #888; margin-top: 4px; }

        /* Inputs & Buttons */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--accent); border: none; border-radius: 8px; color: var(--text); box-sizing: border-box; font-size: 0.9rem; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-secondary { background: none; border: 1px solid var(--accent); color: #888; padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.8rem; margin-top: 5px; }

        /* Live Tracker UI */
        #timer-display { text-align: center; font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .live-tracker { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; border: 1px solid var(--accent); }
        .set-dots { display: flex; justify-content: center; gap: 10px; margin: 12px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #444; border: 2px solid transparent; }
        .dot.done { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* History List & Editing */
        .workout-list { list-style: none; padding: 0; margin-top: 10px; }
        .workout-item { background: var(--card); margin-bottom: 8px; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .edit-group { display: flex; align-items: center; gap: 5px; }
        .edit-input { background: #000; color: var(--primary); border: 1px solid var(--primary); width: 35px; text-align: center; border-radius: 4px; padding: 2px; font-weight: bold; }
        
        .pr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .pr-box { background: var(--accent); padding: 8px; border-radius: 8px; text-align: center; font-size: 0.75rem; }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; font-size:1.5rem; font-weight: 800; letter-spacing: -1px;">IRONTRACK <span style="color:var(--primary)">ULTRA</span></h2>
        <button onclick="toggleTheme()" style="background:var(--accent); border:none; color:var(--text); padding:8px 12px; border-radius:12px; cursor:pointer;">🌓</button>
    </div>

    <div class="card">
        <h3>Weekly Momentum</h3>
        <div class="summary-bar-container" id="weekly-chart"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="changeMonth(-1)" style="color:var(--text); background:none; border:none; cursor:pointer; font-size: 1.2rem;">◀</button>
            <h4 id="month-display" style="margin:0; font-size:1rem; font-weight: bold;"></h4>
            <button onclick="changeMonth(1)" style="color:var(--text); background:none; border:none; cursor:pointer; font-size: 1.2rem;">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
        <button class="btn-secondary" onclick="toggleRestDay()" id="rest-btn">Mark as Rest Day</button>
    </div>

    <div class="card">
        <h3>Cardio PRs</h3>
        <div class="pr-grid">
            <div class="pr-box">Mile: <span id="best-mile">--</span></div>
            <div class="pr-box">5K: <span id="best-5k">--</span></div>
            <div class="pr-box">10K: <span id="best-10k">--</span></div>
        </div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <select id="pr-type" style="margin:0; flex:1;"><option value="mile">1 Mile</option><option value="5k">5K</option><option value="10k">10K</option></select>
            <input type="text" id="pr-time" placeholder="MM:SS" style="margin:0; flex:1;">
            <button onclick="savePR()" class="btn-main" style="width: 60px; padding: 0;">Set</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3>💪 Training Session</h3>
            <button onclick="generateRoutine()" style="font-size:0.6rem; border:1px solid var(--primary); background:none; color:var(--primary); padding:3px 8px; border-radius:6px; cursor:pointer;">Auto-Generate</button>
        </div>
        
        <div id="timer-display">00:00</div>
        
        <input list="ex-lib" id="ex-name" placeholder="Exercise (e.g. Diamond Pushups)">
        <datalist id="ex-lib"></datalist>
        
        <div style="display:flex; gap:10px;">
            <input type="number" id="ex-sets" placeholder="Sets" oninput="updateDots()">
            <input type="number" id="ex-reps" placeholder="Reps">
        </div>

        <div class="live-tracker">
            <div id="set-info" style="font-weight: bold; font-size: 0.9rem;">Set 1</div>
            <div class="set-dots" id="set-dots"></div>
            <button id="set-btn" class="btn-main" onclick="completeSet()">START WORKOUT</button>
        </div>
    </div>

    <div class="card">
        <h3>🍎 Daily Calories</h3>
        <div style="display:flex; gap:10px;">
            <input type="number" id="cal-input" placeholder="Total Calories" style="margin:0;">
            <button onclick="saveCals()" class="btn-main" style="width: 80px;">Save</button>
        </div>
        <p id="cal-display" style="font-size: 0.75rem; color: #888; margin-top: 8px;">Logged: 0 kcal</p>
    </div>

    <ul id="workout-list" class="workout-list"></ul>
    
    <div style="text-align:center; margin-top: 30px;">
        <button class="btn-secondary" onclick="exportCSV()" style="border-color: var(--primary); color: var(--primary);">📥 Download Data (CSV)</button>
    </div>
</div>

<script>
    let currentViewDate = new Date();
    let selectedDate = new Date().toLocaleDateString();
    let currentSet = 1;
    let timerInt;

    // --- AUDIO SYSTEM ---
    function playDing() {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, context.currentTime);
            gain.gain.setValueAtTime(0, context.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, context.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.8);
            osc.connect(gain); gain.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.8);
        } catch(e) { console.log("Audio not supported"); }
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        initLibrary();
        renderAll();
        if(localStorage.getItem('theme')) document.body.setAttribute('data-theme', localStorage.getItem('theme'));
    });

    function renderAll() {
        renderCalendar();
        renderWorkouts();
        renderWeeklySummary();
        renderPRs();
        renderCals();
    }

    // --- CALENDAR & REST LOGIC ---
    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('month-display').innerText = `${months[currentViewDate.getMonth()]} ${currentViewDate.getFullYear()}`;
        
        const lastDay = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0).getDate();
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const rests = JSON.parse(localStorage.getItem('restDays') || '[]');

        let html = "";
        for (let i = 1; i <= lastDay; i++) {
            const dStr = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), i).toLocaleDateString();
            const hasData = logs.some(l => l.date === dStr) ? "has-data" : "";
            const isRest = rests.includes(dStr) ? "is-rest" : "";
            const isSelected = dStr === selectedDate ? "selected" : "";
            html += `<div class="day ${hasData} ${isRest} ${isSelected}" onclick="selectDate('${dStr}')">${i}</div>`;
        }
        grid.innerHTML = html;
        
        const restsArr = JSON.parse(localStorage.getItem('restDays') || '[]');
        document.getElementById('rest-btn').innerText = restsArr.includes(selectedDate) ? "Unmark Rest Day" : "Mark as Rest Day";
    }

    function selectDate(d) { selectedDate = d; renderAll(); }
    function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }
    
    function toggleRestDay() {
        let rests = JSON.parse(localStorage.getItem('restDays') || '[]');
        if (rests.includes(selectedDate)) rests = rests.filter(d => d !== selectedDate);
        else rests.push(selectedDate);
        localStorage.setItem('restDays', JSON.stringify(rests));
        renderCalendar();
    }

    // --- WORKOUT TRACKING ---
    function updateDots() {
        const target = parseInt(document.getElementById('ex-sets').value) || 0;
        const container = document.getElementById('set-dots');
        container.innerHTML = Array.from({length:target}, (_,i) => `<div class="dot ${i < currentSet-1 ? 'done' : ''}"></div>`).join('');
        document.getElementById('set-info').innerText = target > 0 ? `Set ${currentSet} of ${target}` : 'Set Target Sets';
        document.getElementById('set-btn').innerText = (currentSet >= target && target > 0) ? "FINISH EXERCISE" : "COMPLETE SET";
    }

    function completeSet() {
        const name = document.getElementById('ex-name').value;
        const target = parseInt(document.getElementById('ex-sets').value);
        const reps = document.getElementById('ex-reps').value;
        if(!name || !target || !reps) return alert("Fill out the exercise info first!");

        if(currentSet >= target) {
            saveLog(name, target, reps);
            resetTracker();
        } else {
            currentSet++;
            startTimer(60);
            updateDots();
        }
    }

    function saveLog(name, sets, reps) {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        logs.push({ id: Date.now(), date: selectedDate, name, sets: parseInt(sets), reps: parseInt(reps), vol: sets * reps });
        localStorage.setItem('ultraLogs', JSON.stringify(logs));
        renderAll();
    }

    function editLog(id, field, val) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs'));
        const i = logs.findIndex(l => l.id === id);
        logs[i][field] = parseInt(val);
        logs[i].vol = logs[i].sets * logs[i].reps;
        localStorage.setItem('ultraLogs', JSON.stringify(logs));
        renderWeeklySummary();
    }

    function deleteLog(id) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs'));
        localStorage.setItem('ultraLogs', JSON.stringify(logs.filter(l => l.id !== id)));
        renderAll();
    }

    function renderWorkouts() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const filtered = logs.filter(l => l.date === selectedDate);
        const list = document.getElementById('workout-list');
        list.innerHTML = filtered.length ? `<h3 style="font-size:0.7rem; margin-bottom:10px;">Log for ${selectedDate}</h3>` : '';
        list.innerHTML += filtered.map(w => `
            <li class="workout-item">
                <div class="edit-group">
                    <input class="edit-input" type="number" value="${w.sets}" onchange="editLog(${w.id}, 'sets', this.value)"> x 
                    <input class="edit-input" type="number" value="${w.reps}" onchange="editLog(${w.id}, 'reps', this.value)">
                    <span style="margin-left:10px; font-weight:bold;">${w.name}</span>
                </div>
                <button onclick="deleteLog(${w.id})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </li>
        `).join('');
    }

    // --- TOOLS ---
    function startTimer(sec) {
        clearInterval(timerInt);
        let t = sec;
        timerInt = setInterval(() => {
            let m = Math.floor(t/60); let s = t%60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(t-- <= 0) { clearInterval(timerInt); playDing(); alert("Rest Finished! Next Set."); }
        }, 1000);
    }

    function renderWeeklySummary() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const chart = document.getElementById('weekly-chart');
        const dayNames = ['S','M','T','W','T','F','S'];
        let days = [];
        for(let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            const vol = logs.filter(l => l.date === d.toLocaleDateString()).reduce((a,b)=>a+b.vol, 0);
            days.push({ name: dayNames[d.getDay()], vol });
        }
        const max = Math.max(...days.map(d => d.vol), 1);
        chart.innerHTML = days.map(d => `<div class="bar-wrapper"><div class="bar" style="height:${(d.vol/max)*100}%"></div><div class="bar-label">${d.name}</div></div>`).join('');
    }

    function resetTracker() {
        currentSet = 1; document.getElementById('ex-name').value = ''; document.getElementById('ex-sets').value = ''; document.getElementById('ex-reps').value = '';
        updateDots(); clearInterval(timerInt); document.getElementById('timer-display').innerText = "00:00";
    }

    function generateRoutine() {
        const lib = ["Pushups", "Squats", "Pullups", "Dips", "Lunges", "Plank", "Chin-ups", "Burpees"];
        document.getElementById('ex-name').value = lib[Math.floor(Math.random()*lib.length)];
        document.getElementById('ex-sets').value = 3; document.getElementById('ex-reps').value = 12;
        updateDots();
    }

    // --- PR & CALS ---
    function savePR() {
        const prs = JSON.parse(localStorage.getItem('runPRs') || '{}');
        prs[document.getElementById('pr-type').value] = document.getElementById('pr-time').value;
        localStorage.setItem('runPRs', JSON.stringify(prs)); renderPRs();
    }
    function renderPRs() {
        const prs = JSON.parse(localStorage.getItem('runPRs') || '{}');
        document.getElementById('best-mile').innerText = prs.mile || '--';
        document.getElementById('best-5k').innerText = prs['5k'] || '--';
        document.getElementById('best-10k').innerText = prs['10k'] || '--';
    }
    function saveCals() {
        const c = JSON.parse(localStorage.getItem('nutriLogs') || '{}');
        c[selectedDate] = document.getElementById('cal-input').value;
        localStorage.setItem('nutriLogs', JSON.stringify(c)); renderCals();
    }
    function renderCals() {
        const c = JSON.parse(localStorage.getItem('nutriLogs') || '{}');
        document.getElementById('cal-display').innerText = `Logged for ${selectedDate}: ${c[selectedDate] || 0} kcal`;
    }

    function initLibrary() {
        const lib = ["Pushups", "Diamond Pushups", "Dips", "Pullups", "Bodyweight Rows", "Squats", "Lunges", "Bulgarian Split Squats", "Plank", "Leg Raises"];
        document.getElementById('ex-lib').innerHTML = lib.map(e => `<option value="${e.name}">`).join('');
    }

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t);
    }

    function exportCSV() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        let csv = "Date,Exercise,Sets,Reps,Volume\n" + logs.map(l => `${l.date},${l.name},${l.sets},${l.reps},${l.vol}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'irontrack_data.csv'; a.click();
    }
</script>
</body>
</html>
