<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra - Command</title>
    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff;
            --primary: #00ff88; --accent: #333; --rest: #3498db; --fuel: #f1c40f; --danger: #ff4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: #666; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .page { display: none; animation: slide 0.3s ease; }
        .page.active { display: block; }

        /* CARDS & UI */
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--accent); }
        h2 { font-size: 1.8rem; font-weight: 800; margin: 10px 0; }
        h3 { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }

        /* INPUTS */
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--accent); border: none; border-radius: 12px; color: var(--text); font-size: 1rem; box-sizing: border-box;}
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-outline { background: none; border: 1px solid var(--accent); color: var(--text); padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 0.75rem; }
        
        /* MEGA TIMER */
        .cooldown-wrap { display: flex; gap: 15px; align-items: stretch; margin-bottom: 15px; }
        .mega-timer { flex: 1; background: #000; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--rest); padding: 10px; }
        .timer-val { font-size: 3rem; font-weight: 900; color: var(--rest); font-variant-numeric: tabular-nums; line-height: 1; margin: 5px 0; }
        .timer-ctrl { display: flex; gap: 5px; width: 100%; }
        .timer-ctrl button { flex: 1; padding: 5px; font-size: 0.7rem; background: var(--accent); border: none; color: #fff; border-radius: 5px; }

        /* GRAPH & CALENDAR */
        #weightGraph { width: 100%; height: 120px; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 12px 0; text-align: center; background: var(--accent); border-radius: 8px; font-size: 0.7rem; position: relative; cursor: pointer; }
        .day.selected { background: var(--primary); color: #000; font-weight: bold; }
        .fuel-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--fuel); border-radius: 0 0 8px 8px; }
    </style>
</head>
<body>

<div class="container">
    
    <section id="page-today" class="page active">
        <h2>Today</h2>

        <div class="cooldown-wrap">
            <div class="card" style="flex: 1.2; margin-bottom: 0;">
                <h3>Tracker</h3>
                <input list="ex-lib" id="ex-name" placeholder="Exercise">
                <datalist id="ex-lib"></datalist>
                <div style="display:flex; gap:8px;">
                    <input type="number" id="ex-sets" placeholder="Sets" oninput="updateDots()">
                    <input type="number" id="ex-reps" placeholder="Reps">
                </div>
                <div id="dot-container" style="display:flex; justify-content:center; gap:5px; margin-bottom:10px;"></div>
                <button id="set-btn" class="btn-main" onclick="logSet()">Log Set 1</button>
            </div>

            <div class="mega-timer">
                <h3 style="color:var(--rest); margin: 0; font-size: 0.6rem;">Cooldown</h3>
                <div class="timer-val" id="timer-display">01:30</div>
                <button id="timer-toggle" onclick="toggleTimer()" style="width:100%; background:var(--rest); border:none; color:white; border-radius:8px; padding:8px; font-weight:800; cursor:pointer; margin-bottom:8px;">START</button>
                <div class="timer-ctrl">
                    <button onclick="adjustTimer(-30)">-30s</button>
                    <button onclick="adjustTimer(30)">+30s</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Routine Architect</h3>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn-outline" onclick="buildRoutine('Arms', this)">Arms</button>
                <button class="btn-outline" onclick="buildRoutine('Legs', this)">Legs</button>
                <button class="btn-outline" onclick="buildRoutine('Back', this)">Back</button>
                <button class="btn-outline" onclick="buildRoutine('Core', this)">Core</button>
            </div>
            <p id="routine-desc" style="font-size:0.7rem; color:#888; margin:0;"></p>
        </div>

        <div id="today-logs"></div>
    </section>

    <section id="page-history" class="page">
        <h2>History</h2>
        
        <div class="card">
            <canvas id="weightGraph"></canvas>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <div style="text-align:center; flex:1">
                    <small style="color:#888">CURRENT WEIGHT</small>
                    <div id="cur-weight-display" style="font-weight:800; color:var(--primary)">--</div>
                </div>
                <div style="text-align:center; flex:1">
                    <small style="color:#888">DAILY GOAL</small>
                    <div id="cur-goal-display" style="font-weight:800; color:var(--fuel)">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <button onclick="changeMonth(-1)" style="color:var(--text); background:none; border:none;">◀</button>
                <h4 id="month-name" style="margin:0;"></h4>
                <button onclick="changeMonth(1)" style="color:var(--text); background:none; border:none;">▶</button>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <div class="card" style="border-color: var(--primary);">
            <h3>Update Vitals (<span id="vit-date"></span>)</h3>
            <div style="display:flex; gap:10px;">
                <input type="number" id="weight-input" placeholder="Weight (lbs)">
                <input type="number" id="cal-input" placeholder="Calories">
            </div>
            <input type="number" id="goal-input" placeholder="Daily Calorie Goal">
            <button onclick="saveVitals()" class="btn-main">Save Updates</button>
        </div>

        <div id="history-details"></div>
    </section>

    <section id="page-lib" class="page">
        <h2>Encyclopedia</h2>
        <input type="text" id="lib-search" placeholder="Search movements..." oninput="renderLibrary()">
        <div id="lib-list"></div>
    </section>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('today', this)"><span>⚡</span>Today</button>
    <button class="nav-item" onclick="showPage('history', this)"><span>📅</span>History</button>
    <button class="nav-item" onclick="showPage('lib', this)"><span>📚</span>Library</button>
</nav>

<script>
    let currentSet = 1, timerSec = 90, timerRunning = false, timerInt;
    let selectedDate = new Date().toLocaleDateString();
    let viewDate = new Date();

    const db = [
        { name: "DB Bicep Curls", muscle: "Arms", info: "Elbows pinned." },
        { name: "DB Hammer Curls", muscle: "Arms", info: "Neutral grip." },
        { name: "DB Goblet Squats", muscle: "Legs", info: "Hold DB at chest." },
        { name: "DB Romanian Deadlift", muscle: "Legs", info: "Feel hamstrings." },
        { name: "DB Single Arm Row", muscle: "Back", info: "Back flat." },
        { name: "DB Russian Twists", muscle: "Core", info: "Rotate torso." },
        { name: "Plank", muscle: "Core", info: "Hold rigid." }
    ];

    function showPage(p, btn) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        btn.classList.add('active');
        renderAll();
    }

    // --- VITALS MANAGEMENT ---
    function saveVitals() {
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const d = selectedDate;
        if(!v[d]) v[d] = {};
        if(document.getElementById('weight-input').value) v[d].weight = document.getElementById('weight-input').value;
        if(document.getElementById('cal-input').value) v[d].cal = document.getElementById('cal-input').value;
        if(document.getElementById('goal-input').value) localStorage.setItem('calGoal', document.getElementById('goal-input').value);
        localStorage.setItem('ultraVitals', JSON.stringify(v));
        renderAll();
    }

    function updateDashboard() {
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const goal = localStorage.getItem('calGoal') || "2500";
        // Get most recent weight
        const weightKeys = Object.keys(v).filter(k => v[k].weight).sort((a,b) => new Date(b) - new Date(a));
        document.getElementById('cur-weight-display').innerText = (weightKeys.length ? v[weightKeys[0]].weight : "--") + " lbs";
        document.getElementById('cur-goal-display').innerText = goal + " kcal";
        document.getElementById('vit-date').innerText = selectedDate;
    }

    // --- MEGA TIMER ---
    function toggleTimer() {
        if(timerRunning) { clearInterval(timerInt); document.getElementById('timer-toggle').innerText = "START"; }
        else {
            timerInt = setInterval(() => {
                timerSec--; updateTimerDisplay();
                if(timerSec <= 0) { clearInterval(timerInt); playDing(); timerRunning = false; document.getElementById('timer-toggle').innerText = "START"; }
            }, 1000);
            document.getElementById('timer-toggle').innerText = "STOP";
        }
        timerRunning = !timerRunning;
    }
    function adjustTimer(amt) { timerSec = Math.max(0, timerSec + amt); updateTimerDisplay(); }
    function updateTimerDisplay() {
        let m = Math.floor(timerSec/60), s = timerSec%60;
        document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
    }
    function playDing() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 1);
    }

    // --- TRACKER ---
    function updateDots() {
        const s = parseInt(document.getElementById('ex-sets').value) || 0;
        const container = document.getElementById('dot-container');
        container.innerHTML = Array.from({length:s}, (_,i) => `<div style="width:8px; height:8px; border-radius:50%; background:${i < currentSet-1 ? 'var(--primary)' : '#333'}"></div>`).join('');
        document.getElementById('set-btn').innerText = (currentSet > s && s > 0) ? "Finish" : `Set ${currentSet}`;
    }
    function logSet() {
        const s = parseInt(document.getElementById('ex-sets').value);
        if(currentSet < s) { currentSet++; updateDots(); } else { saveWorkout(); resetTracker(); }
    }
    function saveWorkout() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        logs.push({ id: Date.now(), date: new Date().toLocaleDateString(), name: document.getElementById('ex-name').value, sets: document.getElementById('ex-sets').value, reps: document.getElementById('ex-reps').value });
        localStorage.setItem('ultraLogs', JSON.stringify(logs)); renderAll();
    }
    function resetTracker() { currentSet = 1; document.getElementById('ex-name').value = ''; document.getElementById('ex-sets').value = ''; document.getElementById('ex-reps').value = ''; updateDots(); }

    // --- RENDERING ---
    function renderWeightGraph() {
        const canvas = document.getElementById('weightGraph');
        const ctx = canvas.getContext('2d');
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const data = [];
        const days = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), i).toLocaleDateString();
            if(v[d]?.weight) data.push({x: i, y: parseFloat(v[d].weight)});
        }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(data.length < 2) return;
        const minW = Math.min(...data.map(p => p.y)) - 1;
        const maxW = Math.max(...data.map(p => p.y)) + 1;
        ctx.beginPath(); ctx.strokeStyle = "var(--primary)"; ctx.lineWidth = 2;
        data.forEach((p, i) => {
            const x = (p.x/days)*canvas.width;
            const y = canvas.height - ((p.y-minW)/(maxW-minW))*canvas.height;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar');
        document.getElementById('month-name').innerText = viewDate.toLocaleString('default', {month:'long', year:'numeric'});
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        const v = JSON.parse(localStorage.getItem('ultraVitals') || '{}');
        const goal = localStorage.getItem('calGoal') || 2500;
        grid.innerHTML = '';
        for(let i=1; i<=last; i++) {
            const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), i).toLocaleDateString();
            const dayEl = document.createElement('div');
            dayEl.className = `day ${d === selectedDate ? 'selected' : ''}`;
            const fuel = Math.min((parseInt(v[d]?.cal||0)/goal)*100, 100);
            dayEl.innerHTML = `${i} <div class="fuel-bar" style="width:${fuel}%"></div>`;
            dayEl.onclick = () => { selectedDate = d; renderAll(); };
            grid.appendChild(dayEl);
        }
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('ultraLogs') || '[]');
        const filtered = logs.filter(l => l.date === selectedDate);
        const html = filtered.map(l => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${l.name}</strong><br><small>${l.sets}x${l.reps}</small></div><button onclick="deleteLog(${l.id})" style="color:var(--danger); background:none; border:none;">✕</button></div>`).join('');
        document.getElementById('history-details').innerHTML = html;
        if(selectedDate === new Date().toLocaleDateString()) document.getElementById('today-logs').innerHTML = `<h3>Logged Today</h3>` + html;
    }

    function renderLibrary() {
        const q = document.getElementById('lib-search').value.toLowerCase();
        document.getElementById('lib-list').innerHTML = db.filter(ex => ex.name.toLowerCase().includes(q) || ex.muscle.toLowerCase().includes(q)).map(ex => `<div class="card"><strong>${ex.name}</strong> <span style="color:var(--primary); font-size:0.7rem;">${ex.muscle}</span><p style="font-size:0.8rem; color:#888; margin:5px 0 0 0;">${ex.info}</p></div>`).join('');
    }

    function buildRoutine(f, btn) {
        document.querySelectorAll('.btn-outline').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const s = db.filter(ex => ex.muscle === f).sort(() => 0.5 - Math.random()).slice(0, 3);
        document.getElementById('routine-desc').innerHTML = s.map(x => x.name).join(' • ');
        document.getElementById('ex-name').value = s[0].name;
        document.getElementById('ex-sets').value = 3; document.getElementById('ex-reps').value = 12;
        updateDots();
    }

    function deleteLog(id) {
        let logs = JSON.parse(localStorage.getItem('ultraLogs')).filter(l => l.id !== id);
        localStorage.setItem('ultraLogs', JSON.stringify(logs)); renderAll();
    }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth()+dir); renderAll(); }
    function renderAll() { updateDashboard(); renderCalendar(); renderHistory(); renderLibrary(); renderWeightGraph(); }
    
    document.getElementById('ex-lib').innerHTML = db.map(ex => `<option value="${ex.name}">`).join('');
    renderAll();
</script>
</body>
</html>
