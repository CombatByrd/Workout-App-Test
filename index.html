<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra - All-in-One</title>
    <style>
        /* 1. THEME & CORE DESIGN */
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --primary: #00ff88;
            --accent: #333;
            --danger: #ff4444;
        }

        [data-theme="light"] {
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #00b361;
            --accent: #e0e0e0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            margin: 0;
            padding-bottom: 50px;
        }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 20px; box-sizing: border-box; }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--accent);
            border: none;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
